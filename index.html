<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V85 战争文明模拟器</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="topbar">🌍 V85 战争文明模拟器</div>

<div class="layout">

  <div class="map" id="map"></div>

  <div class="side">

    <div class="card">
      <h3>🌍 世界状态</h3>
      <p>秩序: <span id="order">50</span></p>
      <p>混乱: <span id="chaos">50</span></p>
      <p>科技: <span id="tech">50</span></p>
    </div>

    <div class="card">
      <h3>🏛 国家力量</h3>
      <p>红国: <span id="red">50</span></p>
      <p>蓝国: <span id="blue">50</span></p>
      <p>绿国: <span id="green">50</span></p>
    </div>

    <div class="card">
      <h3>⚔️ 战争日志</h3>
      <div id="log"></div>
    </div>

    <button onclick="tick()">▶ 推进世界</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
